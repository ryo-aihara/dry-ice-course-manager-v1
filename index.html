<!-- index.html -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Dry Ice Course Manager</title>

  <!-- Cache buster (iPhone対策): v を変えれば必ず更新される -->
  <link rel="stylesheet" href="css/style.css?v=20260303a" />

  <!-- iOS PWAっぽく見せる（SWは使わない方針） -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>

<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="title">Dry Ice Course Manager</div>
        <div class="subtitle">ドライアイス コース管理</div>
      </div>

      <div class="status">
        <div class="pill" id="monthPill">MONTH: ---- --</div>
        <div class="pill" id="modePill">MODE: --</div>
        <div class="pill warn hidden" id="overridePill">OVERRIDE</div>
      </div>
    </header>

    <main class="panel">
      <!-- 便トグル -->
      <section class="section">
        <div class="sectionTitle">便</div>
        <div class="seg" role="tablist" aria-label="便トグル">
          <button class="segBtn active" id="bin1Btn" type="button" aria-selected="true">1便</button>
          <button class="segBtn" id="bin2Btn" type="button" aria-selected="false">2便</button>
        </div>
      </section>

      <!-- 期（25/30） -->
      <section class="section">
        <div class="sectionTitle">期（25 / 30）</div>
        <div class="seg" role="tablist" aria-label="期トグル">
          <button class="segBtn" id="mode25Btn" type="button" aria-selected="false">25期</button>
          <button class="segBtn" id="mode30Btn" type="button" aria-selected="false">30期</button>
        </div>
        <div class="hint" id="monthGateHint">
          ※月初（毎月1日）に期の再選択が必要。CSVの shime_size が最優先。
        </div>
      </section>

      <!-- 範囲タブ -->
      <section class="section">
        <div class="sectionTitle">範囲</div>
        <div class="tabs" role="tablist" aria-label="範囲タブ">
          <button class="tabBtn active" id="tab501" type="button" aria-selected="true">501-510</button>
          <button class="tabBtn" id="tab601" type="button" aria-selected="false">601-619</button>
          <button class="tabBtn" id="tab621" type="button" aria-selected="false">621-648</button>
        </div>
      </section>

      <!-- 検索 -->
      <section class="section">
        <div class="sectionTitle">検索</div>
        <div class="searchRow">
          <input id="courseSearch" class="searchInput" inputmode="numeric" pattern="[0-9]*"
                 placeholder="例）501 / 50（前方一致）" />
          <button id="clearSearch" class="ghostBtn" type="button">クリア</button>
        </div>
      </section>

      <!-- ビュー切替（見た目だけ先に） -->
      <section class="section">
        <div class="sectionTitle">表示</div>
        <div class="tabs" role="tablist" aria-label="表示モード">
          <button class="tabBtn active" id="viewCards" type="button" aria-selected="true">カード</button>
          <button class="tabBtn" id="viewPaper" type="button" aria-selected="false">紙ビュー</button>
          <button class="tabBtn" id="viewData" type="button" aria-selected="false">データ</button>
        </div>
      </section>

      <!-- コンテンツ領域（後で差し替え） -->
      <section class="content">
        <div class="card placeholder">
          <div class="phTitle">準備OK</div>
          <div class="phText">
            ここから CSV貼り付け → カード生成 → グループ分け → 合計（ドライ/蓄冷）へ進める。<br/>
            いまは骨組みとキャッシュ対策（BUILD表示）だけ先に固めてる。
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="build" id="buildLabel">BUILD: 20260303a</div>
      <div class="footerNote">※SWなし / v更新で確実に更新（iPhoneキャッシュ対策）</div>
    </footer>
  </div>

  <!-- Cache buster -->
  <script type="module" src="js/app.js?v=20260303a"></script>
</body>
</html>
